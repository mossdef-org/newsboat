permissions:
  contents: write
name: Build OpenWrt Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.version }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      PKG_NAME: ${{ github.event.repository.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # 25.12 (apk, all OpenWrt-supported arches)
          - version: openwrt-25.12
            target: aarch64_cortex-a53
          - version: openwrt-25.12
            target: aarch64_cortex-a72
          - version: openwrt-25.12
            target: aarch64_cortex-a76
          - version: openwrt-25.12
            target: aarch64_generic
          - version: openwrt-25.12
            target: arm_arm1176jzf-s_vfp
          - version: openwrt-25.12
            target: arm_arm926ej-s
          - version: openwrt-25.12
            target: arm_cortex-a15_neon-vfpv4
          - version: openwrt-25.12
            target: arm_cortex-a5_vfpv4
          - version: openwrt-25.12
            target: arm_cortex-a7
          - version: openwrt-25.12
            target: arm_cortex-a7_neon-vfpv4
          - version: openwrt-25.12
            target: arm_cortex-a7_vfpv4
          - version: openwrt-25.12
            target: arm_cortex-a8_vfpv3
          - version: openwrt-25.12
            target: arm_cortex-a9
          - version: openwrt-25.12
            target: arm_cortex-a9_neon
          - version: openwrt-25.12
            target: arm_cortex-a9_vfpv3-d16
          - version: openwrt-25.12
            target: arm_fa526
          - version: openwrt-25.12
            target: arm_xscale
          # armeb (big-endian ARM) is not in rust's RUST_ARCH_DEPENDS, so
          # newsboat is silently skipped there — omit it instead of shipping a
          # false-green job that produces no package.
          - version: openwrt-25.12
            target: i386_pentium-mmx
          - version: openwrt-25.12
            target: i386_pentium4
          - version: openwrt-25.12
            target: loongarch64_generic
          - version: openwrt-25.12
            target: mips64_mips64r2
          - version: openwrt-25.12
            target: mips64_octeonplus
          # mips64el_mips64r2 is omitted: rust IS listed for it in RUST_ARCH_DEPENDS,
          # but the rust host toolchain (rust 1.94, target
          # mips64el-unknown-linux-muslabi64) fails to build in the 25.12 SDK — it
          # was the sole red job across every run while all 41 other arches, incl.
          # big-endian mips64 (rustc's own mips64-openwrt-linux-musl target) and
          # 32-bit mipsel, pass. Re-add once the upstream rust build is fixed.
          - version: openwrt-25.12
            target: mips_24kc
          - version: openwrt-25.12
            target: mips_mips32
          - version: openwrt-25.12
            target: mipsel_24kc
          - version: openwrt-25.12
            target: mipsel_24kc_24kf
          - version: openwrt-25.12
            target: mipsel_74kc
          - version: openwrt-25.12
            target: mipsel_mips32
          - version: openwrt-25.12
            target: powerpc64_e5500
          - version: openwrt-25.12
            target: powerpc_464fp
          - version: openwrt-25.12
            target: powerpc_8548
          - version: openwrt-25.12
            target: riscv64_generic
          - version: openwrt-25.12
            target: x86_64

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v5

      - name: 🧰 Set up melmac feed structure
        run: |
          # Create a proper OpenWrt feed layout where each package lives in its own subdir
          mkdir -p feed/${PKG_NAME}
          # Copy the package sources into the feed subdir (exclude CI and feed itself)
          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            ./ feed/${PKG_NAME}/

      - name: 🧩 Add libstfl build dependency to feed
        # newsboat DEPENDS on +libstfl (provided by the mossdef-org/stfl package).
        # The SDK has no such package on its own, so newsboat's config.sh fails at
        # `pkg-config stfl`. Drop the stfl package into the same melmac feed so the
        # SDK builds libstfl (staging stfl.pc via Build/InstallDev) before newsboat.
        uses: actions/checkout@v5
        with:
          repository: mossdef-org/stfl
          ref: main
          path: feed/stfl

      - name: 🧮 Compute ARCH
        run: |
          # matrix.version is the release-line LABEL baked into artifact filenames
          # (sync_repo.sh matches *_openwrt-25.12_*), NOT the SDK image tag. Pin the
          # SDK to a specific STABLE point release so builds are reproducible and
          # immune to 25.12-SNAPSHOT mirror churn (rotated/truncated tarballs →
          # sha256 mismatch). Bump these when a new point release ships.
          case "${{ matrix.version }}" in
            openwrt-25.12) SDK_VERSION="25.12.5" ;;
            openwrt-24.10) SDK_VERSION="24.10.7" ;;
            snapshots)     SDK_VERSION="SNAPSHOT" ;;
            *)             SDK_VERSION="${{ matrix.version }}" ;;
          esac
          echo "ARCH=${{ matrix.target }}-${SDK_VERSION}" >> "$GITHUB_ENV"

      - name: 🧹 Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: melmac
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          PRIVATE_KEY: ${{ secrets.REPO_APK_KEY }}

      - name: 🪵 Dump build log on failure
        if: failure()
        # The SDK writes a per-package compile log (BUILD_LOG defaults to 1).
        # Surface it so a "failed to build" shows the real error inline instead
        # of needing a manual V=s re-run.
        run: |
          echo "::group::newsboat compile log"
          find . -path '*/logs/package/*newsboat*' -name '*.txt' -exec sh -c \
            'echo "===== $1 ====="; cat "$1"' _ {} \;
          echo "::endgroup::"

      - name: 🏷️ Rename APK with version and target
        run: |
          set -euo pipefail
          PKG_VERSION=$(grep -E '^PKG_VERSION *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          PKG_RELEASE=$(grep -E '^PKG_RELEASE *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          # Scope to the newsboat package only — the melmac feed now also builds
          # libstfl (a build dependency), and we must not rename/clobber it.
          for ext in ipk apk; do
            for f in $(find bin/packages -type f -path "*/melmac/${PKG_NAME}[-_]*.${ext}"); do
              dir=$(dirname "$f")
                mv -v "$f" "$dir/${PKG_NAME}-${PKG_VERSION}-${PKG_RELEASE}_${{ matrix.version }}_${{ matrix.target }}.${ext}"
            done
          done

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/melmac/${{ env.PKG_NAME }}*.ipk
            bin/packages/*/melmac/${{ env.PKG_NAME }}*.apk
          if-no-files-found: ignore

  release:
    name: Release ${{ github.repository }}
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v5

      - name: 🔍 Extract version and release from Makefile
        id: version
        run: |
          PKG_VERSION=$(grep -E '^PKG_VERSION *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          PKG_RELEASE=$(grep -E '^PKG_RELEASE *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          COMBINED_VERSION="${PKG_VERSION}-${PKG_RELEASE}"
          echo "📦 Version: $COMBINED_VERSION"
          echo "version=$COMBINED_VERSION" >> "$GITHUB_OUTPUT"

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Build v${{ steps.version.outputs.version }}
          files: |
            ./release-assets/**/*.ipk
            ./release-assets/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
