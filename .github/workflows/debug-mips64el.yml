permissions:
  contents: read
name: DEBUG mips64el rust build

# Manual-only diagnostic run for the one arch that fails in the release build:
# openwrt-25.12 / mips64el_mips64r2. newsboat DEPENDS on rust/host, and building
# the rust host toolchain for target mips64el-unknown-linux-muslabi64 is what
# fails there. The release workflow runs the SDK without V=s and only dumps the
# newsboat compile log, so the real rust error never surfaces. This job builds
# the same package with V=s + BUILD_LOG=1 and then prints and uploads every log
# under logs/ — the rust host compile log first — so the failure is visible.

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug openwrt-25.12 / mips64el_mips64r2
    runs-on: ubuntu-latest
    env:
      PKG_NAME: ${{ github.event.repository.name }}
      VERSION: openwrt-25.12
      TARGET: mips64el_mips64r2

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v5

      - name: 🧰 Set up melmac feed structure
        run: |
          mkdir -p feed/${PKG_NAME}
          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            ./ feed/${PKG_NAME}/

      - name: 🧩 Add libstfl build dependency to feed
        uses: actions/checkout@v5
        with:
          repository: mossdef-org/stfl
          ref: main
          path: feed/stfl

      - name: 🧮 Compute ARCH
        run: echo "ARCH=${TARGET}-${VERSION}" >> "$GITHUB_ENV"

      - name: 🧹 Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: 🏗️ Build with OpenWrt SDK (verbose)
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: melmac
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          BUILD_LOG: 1
          V: s
          PRIVATE_KEY: ${{ secrets.REPO_APK_KEY }}

      - name: 🪵 Dump rust host build log
        if: always()
        run: |
          echo "::group::rust host compile log"
          find . -path '*/logs/*rust*' -name '*.txt' \
            -exec sh -c 'echo "===== $1 ====="; cat "$1"' _ {} \; || true
          echo "::endgroup::"

      - name: 🪵 Dump ALL build logs
        if: always()
        run: |
          echo "::group::every log under logs/"
          find . -path '*/logs/*' -name '*.txt' | sort | while read -r f; do
            echo ""; echo "########## $f ##########"; cat "$f"
          done || true
          echo "::endgroup::"

      - name: 📦 Upload full logs directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsboat-mips64el-logs
          path: |
            **/logs/**
          if-no-files-found: warn
